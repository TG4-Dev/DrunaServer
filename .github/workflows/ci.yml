name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...
        env:
          JWT_SECRET: ci-test-secret-key

      - name: Vet
        run: go vet ./...
        env:
          JWT_SECRET: ci-test-secret-key

      - name: Test
        run: go test ./... -count=1
        env:
          JWT_SECRET: ci-test-secret-key

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
