basePath: /
definitions:
  handler.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  model.AddEventDoc:
    properties:
      Id:
        type: integer
    type: object
  model.AddGroupMemberDoc:
    properties:
      username:
        type: string
    type: object
  model.EventDoc:
    properties:
      endTime:
        type: string
      eventID:
        type: integer
      startTime:
        type: string
      title:
        type: string
      type:
        type: string
    required:
    - endTime
    - startTime
    - title
    type: object
  model.FreeTimeInputDoc:
    properties:
      date:
        type: string
    type: object
  model.FreeTimeResponseDoc:
    properties:
      freeSlots:
        items:
          $ref: '#/definitions/model.TimeSlot'
        type: array
    type: object
  model.FriendRequestDoc:
    properties:
      username:
        type: string
    type: object
  model.Group:
    properties:
      confirmedTime:
        type: string
      groupID:
        type: integer
      name:
        type: string
      ownerID:
        type: integer
    required:
    - name
    type: object
  model.GroupDetails:
    properties:
      confirmedTime:
        type: string
      groupID:
        type: integer
      members:
        items:
          $ref: '#/definitions/model.GroupMemberInfo'
        type: array
      name:
        type: string
      ownerID:
        type: integer
    required:
    - name
    type: object
  model.GroupMemberInfo:
    properties:
      id:
        type: integer
      name:
        type: string
      username:
        type: string
    type: object
  model.RenewTokenDoc:
    properties:
      refreshToken:
        type: string
    type: object
  model.SignInDoc:
    properties:
      passwordHash:
        type: string
      username:
        type: string
    type: object
  model.SignUpDoc:
    properties:
      email:
        type: string
      name:
        type: string
      passwordHash:
        type: string
      username:
        type: string
    type: object
  model.TelegramAuthDoc:
    properties:
      initData:
        type: string
    type: object
  model.TimeSlot:
    properties:
      end:
        type: string
      start:
        type: string
    type: object
host: localhost:8000
info:
  contact: {}
  description: API server for Druna App
  title: Druna API
  version: "1.0"
paths:
  /api/events:
    get:
      description: Get current user's event list
      operationId: get-events
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.EventDoc'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        default:
          description: ""
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get event List
      tags:
      - events
  /api/events/:
    post:
      consumes:
      - application/json
      description: Create event
      operationId: create-event
      parameters:
      - description: list info
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/model.EventDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AddEventDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        default:
          description: ""
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create Event
      tags:
      - events
  /api/events/{id}:
    delete:
      description: Delete event by ID
      operationId: delete-event
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete Event
      tags:
      - events
  /api/events/free-time:
    post:
      consumes:
      - application/json
      description: Get free time slots for a given day
      operationId: get-free-time
      parameters:
      - description: date
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/model.FreeTimeInputDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.FreeTimeResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get free time slots
      tags:
      - events
  /api/friends/:
    delete:
      consumes:
      - application/json
      parameters:
      - description: username
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/model.FriendRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete friend
      tags:
      - friends
  /api/friends/accept:
    post:
      consumes:
      - application/json
      parameters:
      - description: username
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/model.FriendRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Accept friend request
      tags:
      - friends
  /api/friends/list:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List friends
      tags:
      - friends
  /api/friends/reject:
    post:
      consumes:
      - application/json
      parameters:
      - description: username
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/model.FriendRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Reject friend request
      tags:
      - friends
  /api/friends/request:
    post:
      consumes:
      - application/json
      parameters:
      - description: username
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/model.FriendRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Send friend request
      tags:
      - friends
  /api/friends/request-list:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List all pending friend requests
      tags:
      - friends
  /api/friends/requests/incoming:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List incoming friend requests
      tags:
      - friends
  /api/friends/requests/outgoing:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
