      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Page offset
        in: query
        name: offset
        type: integer
      - description: Event type filter
        in: query
        name: type
        type: string
      - description: RFC3339 lower bound
        in: query
        name: dateFrom
        type: string
      - description: RFC3339 upper bound
