basePath: /
definitions:
  model.APIResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/model.ErrorBody'
    type: object
  model.AddGroupMemberDoc:
    properties:
      username:
        type: string
    type: object
  model.ConfirmGroupTimeDoc:
    properties:
      confirmedTime:
        type: string
    type: object
  model.ErrorBody:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  model.Event:
    properties:
      endTime:
        type: string
      eventID:
        type: integer
      startTime:
        type: string
      title:
        type: string
      type:
        type: string
      userID:
        type: integer
    required:
    - endTime
    - startTime
    - title
    type: object
  model.FreeTimeInputDoc:
    properties:
      date:
        type: string
    type: object
  model.FriendRequestDoc:
    properties:
      username:
        type: string
    type: object
  model.Group:
    properties:
      confirmedTime:
        type: string
      groupID:
        type: integer
      name:
        type: string
      ownerID:
        type: integer
    required:
    - name
    type: object
  model.GroupFreeTimeInputDoc:
    properties:
      date:
        type: string
    type: object
  model.RenewTokenDoc:
    properties:
      refreshToken:
        type: string
    type: object
  model.SignInDoc:
    properties:
      passwordHash:
        type: string
      username:
        type: string
    type: object
  model.TelegramAuthDoc:
    properties:
      initData:
        type: string
    type: object
  model.UpdateProfileInput:
    properties:
      avatarURL:
        type: string
      name:
        type: string
    type: object
  model.User:
    properties:
      avatarURL:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      password:
        type: string
      passwordHash:
        type: string
      telegramID:
        type: integer
      username:
        type: string
    required:
    - email
    - name
    - username
    type: object
host: localhost:8000
info:
