  /auth/renew-token:
    post:
      consumes:
      - application/json
      description: renew token
      operationId: renew-token
      parameters:
      - description: account info
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/model.RenewTokenDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
